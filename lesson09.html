<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson09 最終テスト</title>

<style>

body{
    margin:0;
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    background:#f5f7fb;
    color:#1f2937;
}

header{
    background:white;
    border-bottom:1px solid #e5e7eb;
    padding:20px;
    text-align:center;
    font-weight:bold;
    font-size:1.3rem;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.lesson-card{
    background:white;
    border-radius:28px;
    padding:35px;
    box-shadow:
    0 4px 20px rgba(0,0,0,.05);
}

.lesson-tag{
    display:inline-block;
    background:#dbeafe;
    color:#2563eb;
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:15px;
}

h1{
    margin-top:0;
    font-size:2.2rem;
}

.description{
    color:#6b7280;
    line-height:1.8;
    margin-bottom:30px;
}

/* セクション */

.section{
    margin-top:30px;
    background:#f8fbff;
    border:1px solid #dbeafe;
    border-radius:22px;
    padding:25px;
}

.section-title{
    font-size:1.2rem;
    font-weight:bold;
    margin-bottom:15px;
    color:#2563eb;
}

/* URL */

.resource-link{
    display:block;
    text-decoration:none;
    background:white;
    border:1px solid #dbeafe;
    padding:14px 18px;
    border-radius:16px;
    margin-bottom:12px;
    color:#2563eb;
    font-weight:600;
    transition:.2s;
}

.resource-link:hover{
    transform:translateY(-2px);
    background:#eff6ff;
}

/* クイズ */

.question{
    margin-bottom:30px;
    padding-bottom:20px;
    border-bottom:1px solid #e5e7eb;
}

.question:last-child{
    border-bottom:none;
}

.question p{
    font-weight:bold;
}

label{
    display:block;
    margin:10px 0;
}

button{
    margin-top:20px;
    background:linear-gradient(
    135deg,
    #2563eb,
    #1e40af
    );

    color:white;
    border:none;
    padding:14px 24px;
    border-radius:999px;
    cursor:pointer;
    font-weight:bold;
    font-size:1rem;
}

.result{
    margin-top:25px;
    background:#eff6ff;
    border-radius:18px;
    padding:20px;
    display:none;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    生徒会ICTのすゝめ
</header>

<div class="container">

    <div class="lesson-card">

        <div class="lesson-tag">
            Lesson 09
        </div>

        <h1>
            最終確認テスト
        </h1>

        <p class="description">

            全ての章の内容を理解できたか、最後に振り返りましょう！確認テスト25点以上を目指しましょう。(点数に達するまで何度でも可能)

        </p>

        <!-- 概要 -->

        <div class="section">

            <div class="section-title">
                📖 この授業の概要
            </div>

            <p>

                space

            </p>

            <ul>

                <li>
                    space
                </li>

            </ul>

        </div>

        <!-- 関連URL -->

        <div class="section">

            <div class="section-title">
                🔗 関連URL
            </div>

            <a class="resource-link"
            href="ここにURL"
            target="_blank">

                URLの名前

            </a>

           

        </div>

        <!-- テスト -->

        <div class="section">

            <div class="section-title">
                📝 理解度チェック
            </div>

            <!-- 問題1 -->

            <div class="question">

                <p>
                    1.Space
                </p>

                <label>
                    <input type="radio"
                    name="q1"
                    value="0">

                    space
                </label>

                <label>
                    <input type="radio"
                    name="q1"
                    value="1">

                    space
                </label>

            </div>

            <!-- 問題2 -->

            <div class="question">

                <p>
                    2.space
                </p>

                <label>
                    <input type="radio"
                    name="q2"
                    value="1">

                    space
                </label>

                <label>
                    <input type="radio"
                    name="q2"
                    value="0">

                    space
                </label>

            </div>

            <!-- 問題3 -->

            <div class="question">

                <p>
                    3.space
                </p>

                <label>
                    <input type="radio"
                    name="q3"
                    value="0">

                    space
                </label>

                <label>
                    <input type="radio"
                    name="q3"
                    value="1">

                    space
                </label>

            </div>

            <!-- 問題4 -->

            <div class="question">

                <p>
                    4.space
                </p>

                <label>
                    <input type="radio"
                    name="q4"
                    value="0">

                    space
                </label>

                <label>
                    <input type="radio"
                    name="q4"
                    value="1">

                    space
                </label>

            </div>

            <!-- 問題5 -->

            <div class="question">

                <p>
                    5.space
                </p>

                <label>
                    <input type="radio"
                    name="q5"
                    value="0">

                    space
                </label>

                <label>
                    <input type="radio"
                    name="q5"
                    value="1">

                    space
                </label>

            </div>

            <button onclick="checkQuiz()">

                採点する

            </button>

            <div class="result"
            id="result"></div>

        </div>

    </div>

</div>

<script>

function checkQuiz(){

    let score = 0;

    const questions = [
        "q1",
        "q2",
        "q3",
        "q4",
        "q5"
    ];

    questions.forEach(q => {

        const selected =
        document.querySelector(
        `input[name="${q}"]:checked`
        );

        if(selected &&
        selected.value === "1"){

            score++;
        }
    });

    const result =
    document.getElementById("result");

    result.style.display = "block";

    if(score === 5){

        result.innerHTML =
        "🎉 5問正解！完璧です！";

    }else if(score >= 3){

        result.innerHTML =
        `👍 ${score}/5問正解！よく理解できています！`;

    }else{

        result.innerHTML =
        `📚 ${score}/5問正解！復習してみよう！`;
    }
}

</script>

</body>
</html>
