<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>生徒会ICT講習会</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f7fb;
    color:#1f2937;
}

/* ヘッダー */

header{
    background:white;
    padding:20px;
    border-bottom:1px solid #ddd;
}

header h1{
    margin:0;
    text-align:center;
}

/* ヒーロー */

.hero{
    background:
    linear-gradient(
        rgba(20,30,70,.85),
        rgba(20,30,70,.92)
    ),
    url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop");

    background-size:cover;
    background-position:center;

    color:white;
    text-align:center;
    padding:120px 20px;
}

.hero h2{
    font-size:3rem;
    margin-bottom:20px;
}

.hero p{
    opacity:.9;
}

/* コンテンツ */

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

/* カード */

.lesson-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.lesson-card{
    background:white;
    border-radius:20px;
    padding:25px;
    text-decoration:none;
    color:inherit;

    border:1px solid #e5e7eb;

    transition:.25s;

    box-shadow:
    0 4px 20px rgba(0,0,0,.04);
}

.lesson-card:hover{
    transform:translateY(-5px);
    box-shadow:
    0 10px 30px rgba(37,99,235,.15);
}

.lesson-number{
    width:35px;
    height:35px;

    background:#dbeafe;
    color:#2563eb;

    border-radius:10px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:bold;

    margin-bottom:15px;
}

.lesson-card h3{
    margin-top:0;
}

.lesson-card p{
    color:#6b7280;
    line-height:1.7;
}
</style>
</head>

<body>

<header>
    <h1>2026年度 生徒会ICT講習会</h1>
</header>

<section class="hero">
    <h2>ICT・情報モラル・生成AI</h2>

    <p>
        生徒会活動で必要な
        デジタルスキルを学ぶ
    </p>
</section>

<div class="container">

    <div class="lesson-grid">

        <a href="lessons/lesson01.html"
        class="lesson-card">

            <div class="lesson-number">
                01
            </div>

            <h3>インターネットとは</h3>

            <p>
                SNS・情報モラル・
                公共Wi-Fiなどを学習
            </p>

        </a>

        <a href="lessons/lesson02.html"
        class="lesson-card">

            <div class="lesson-number">
                02
            </div>

            <h3>Google Workspace</h3>

            <p>
                Drive・Forms・
                Spreadsheetを学ぶ
            </p>

        </a>

        <a href="lessons/lesson03.html"
        class="lesson-card">

            <div class="lesson-number">
                03
            </div>

            <h3>生成AIについて</h3>

            <p>
                ChatGPTやGeminiの
                活用方法を学習
            </p>

        </a>

    </div>

</div>

</body>
</html>
