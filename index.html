<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3;url=https://example.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページ移転のお知らせ</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fa;
            font-family:sans-serif;
        }

        .box{
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
            text-align:center;
            max-width:500px;
            width:90%;
        }

        h1{
            color:#0078ff;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:18px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#0078ff;
            color:#fff;
            text-decoration:none;
            padding:12px 24px;
            border-radius:8px;
            font-weight:bold;
        }

        a:hover{
            background:#005fcc;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>ページを変更しました</h1>
    <p>
        新しいページへ自動的に移動します。<br>
        移動しない場合は下のボタンを押してください。
    </p>

    <a href="https://lafa.weblike.jp/googleworkspace">新しいページへ</a>
</div>

</body>
</html>
